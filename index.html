<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium For Na</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Inter:wght@300&display=swap');

        body {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Thư chuyên nghiệp sang trọng */
        #letter-box {
            text-align: center;
            transition: all 1.5s ease;
            max-width: 500px;
        }

        #letter-box h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            font-style: italic;
            margin-bottom: 30px;
            color: #d4af37; /* Màu vàng Luxury */
        }

        #btn-hide {
            background: transparent;
            color: #fff;
            border: 1px solid #d4af37;
            padding: 12px 35px;
            font-size: 0.8rem;
            letter-spacing: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.5s;
        }

        #btn-hide:hover { background: #d4af37; color: #000; }

        /* Màn hình đếm ngược và hiện chữ */
        #display-screen {
            display: none;
            position: fixed;
            text-align: center;
        }

        #counter, #main-text {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 10px;
            text-transform: uppercase;
        }

        /* Canvas cho hiệu ứng tuyết tan biến */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="letter-box">
        <h2>"Gửi đến Na những điều bình yên nhất..."</h2>
        <button id="btn-hide">Chấp nhận</button>
    </div>

    <div id="display-screen">
        <div id="counter"></div>
        <div id="main-text"></div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const btn = document.getElementById('btn-hide');
        const letter = document.getElementById('letter-box');
        const screen = document.getElementById('display-screen');
        const counter = document.getElementById('counter');
        const mainText = document.getElementById('main-text');
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        btn.addEventListener('click', () => {
            // Ẩn thư từ từ
            letter.style.opacity = '0';
            letter.style.transform = 'translateY(-20px)';
            
            setTimeout(() => {
                letter.style.display = 'none';
                screen.style.display = 'block';
                startSequence();
            }, 1500);
        });

        function startSequence() {
            let count = 3;
            const timer = setInterval(() => {
                counter.innerText = count;
                if (count === 0) {
                    clearInterval(timer);
                    counter.innerText = "";
                    showNaBell();
                }
                count--;
            }, 1000); // Chậm 1 giây mỗi số
        }

        function showNaBell() {
            const str = "NA Bell";
            let i = 0;
            const type = setInterval(() => {
                mainText.innerText += str[i];
                i++;
                if (i === str.length) {
                    clearInterval(type);
                    setTimeout(disintegrate, 2000); // Hiện xong 2s rồi tan biến
                }
            }, 500); // Hiện từng chữ chậm rãi
        }

        function disintegrate() {
            html2canvas(mainText, { backgroundColor: null }).then(cvs => {
                const imgData = cvs.getContext('2d').getImageData(0, 0, cvs.width, cvs.height);
                mainText.style.opacity = '0';
                
                const particles = [];
                for (let y = 0; y < cvs.height; y += 2) {
                    for (let x = 0; x < cvs.width; x += 2) {
                        const i = (y * cvs.width + x) * 4;
                        if (imgData.data[i + 3] > 0) {
                            particles.push({
                                x: x + (window.innerWidth / 2 - cvs.width / 2),
                                y: y + (window.innerHeight / 2 - cvs.height / 2),
                                vx: (Math.random() - 0.5) * 2,
                                vy: (Math.random() - 1.5) * 2,
                                size: Math.random() * 2,
                                alpha: 1
                            });
                        }
                    }
                }

                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach((p, index) => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.alpha -= 0.005;
                        ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                        ctx.fillRect(p.x, p.y, p.size, p.size);
                        if (p.alpha <= 0) particles.splice(index, 1);
                    });
                    if (particles.length > 0) requestAnimationFrame(animate);
                }
                animate();
            });
        }
    </script>
</body>
</html>
