<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium For Na</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap');

        body {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Khung thư tối giản sang trọng */
        #main-container {
            text-align: center;
            transition: all 1.5s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 10;
        }

        .letter-content {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 50px;
            color: #efefef;
            max-width: 600px;
            line-height: 1.6;
        }

        /* Nút Ẩn Thư tinh tế */
        #btn-hide {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px 40px;
            font-size: 0.8rem;
            letter-spacing: 5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.5s;
        }

        #btn-hide:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* Màn hình hiển thị VIP */
        #vip-screen {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            text-align: center;
        }

        #dynamic-text {
            font-size: 4rem;
            font-weight: 600;
            letter-spacing: 15px;
            text-transform: uppercase;
            white-space: nowrap;
            color: #fff;
            /* Hiệu ứng phát sáng nhẹ cao cấp */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        /* Hiệu ứng ẩn siêu đẹp */
        .hide-effect {
            opacity: 0 !important;
            filter: blur(20px);
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="letter-content">
            Chào Na, đây là một điều đặc biệt dành cho bạn.
        </div>
        <button id="btn-hide">Ẩn Thư</button>
    </div>

    <div id="vip-screen">
        <div id="dynamic-text"></div>
    </div>

    <script>
        const btn = document.getElementById('btn-hide');
        const container = document.getElementById('main-container');
        const vipScreen = document.getElementById('vip-screen');
        const textElement = document.getElementById('dynamic-text');

        const targetText = "NA Bell";

        btn.addEventListener('click', () => {
            // Hiệu ứng ẩn siêu mượt
            container.classList.add('hide-effect');
            
            setTimeout(() => {
                container.style.display = 'none';
                vipScreen.style.display = 'block';
                
                // Bắt đầu hiện chữ kiểu VIP, đổi từng chữ chậm rãi
                startVipAnimation();
            }, 1500);
        });

        function startVipAnimation() {
            let currentStr = "";
            let i = 0;

            // Đánh chữ chậm rãi từng chữ một
            const interval = setInterval(() => {
                if (i < targetText.length) {
                    currentStr += targetText[i];
                    textElement.innerText = currentStr;
                    i++;
                } else {
                    clearInterval(interval);
                    // Sau khi hiện xong thì đổi sang màu vàng Luxury nhẹ
                    textElement.style.transition = "2s";
                    textElement.style.color = "#d4af37";
                }
            }, 400); // Đổi chậm 0.4s mỗi chữ theo ý ANH VINH
        }
    </script>
</body>
</html>
