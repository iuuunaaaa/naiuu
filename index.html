<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vin Sì Ke - 3D Snow Universe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Playfair+Display:wght@700&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; }
        
        #letter-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.9); padding: 40px; border: 2px solid #d4af37;
            text-align: center; max-width: 450px; border-radius: 8px; z-index: 10;
            transition: 1s; backdrop-filter: blur(10px);
        }
        h1 { font-family: 'Playfair Display', serif; color: #d4af37; letter-spacing: 5px; }
        .signature {
            display: block; margin-top: 20px; font-size: 1.4rem; font-weight: 800;
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 400%; animation: rainbow 0.5s linear infinite;
        }
        @keyframes rainbow { 0% {background-position: 0%} 100% {background-position: 100%} }
        #btn-hide { background: transparent; color: #fff; border: 1px solid #d4af37; padding: 10px 30px; cursor: pointer; margin-top: 20px; letter-spacing: 3px; }
        
        #sequence { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; }
        #counter { font-size: 8rem; }
        #na-bell { font-size: 3rem; letter-spacing: 10px; white-space: nowrap; }
        
        canvas#three-canvas { position: fixed; top: 0; left: 0; outline: none; display: none; }
    </style>
</head>
<body>

    <div id="letter-box">
        <h1>THƯ VUÝP</h1>
        <div style="font-weight: 300; line-height: 1.8; color: #ddd;">
            Na Ơi Iu Na Bell! <br>
            Chúc Na Mau Lớn Mau Cao Mau Mặp Mặp <br>
            Học Giỏi Tí Cho Đẳng Cấp <br>
            Nghiện Game Hơn Cho Bá Sàn, <br>
            Luôn Luôn Tươi Cười Nhé <br>
            Vin Sike Love Na Bell!
            <span class="signature">By Vin Sì Ke</span>
        </div>
        <button id="btn-hide">ẨN THƯ</button>
    </div>

    <div id="sequence">
        <div id="counter"></div>
        <div id="na-bell"></div>
    </div>

    <canvas id="three-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const btn = document.getElementById('btn-hide');
        const letter = document.getElementById('letter-box');
        const sequence = document.getElementById('sequence');
        const counter = document.getElementById('counter');
        const naText = document.getElementById('na-bell');
        const threeCanvas = document.getElementById('three-canvas');

        btn.addEventListener('click', () => {
            letter.style.opacity = '0';
            setTimeout(() => {
                letter.style.display = 'none';
                sequence.style.display = 'block';
                startFlow();
            }, 1000);
        });

        function startFlow() {
            let c = 3;
            let timer = setInterval(() => {
                if(c > 0) counter.innerText = c;
                else {
                    clearInterval(timer);
                    counter.innerText = "";
                    showNa();
                }
                c--;
            }, 1000);
        }

        function showNa() {
            let str = "NA Bell";
            let i = 0;
            let type = setInterval(() => {
                naText.innerText += str[i];
                i++;
                if(i === str.length) {
                    clearInterval(type);
                    setTimeout(init3D, 1500);
                }
            }, 400);
        }

        function init3D() {
            sequence.style.transition = "2s";
            sequence.style.opacity = "0";
            threeCanvas.style.display = "block";

            // SETUP THREE.JS 3D SNOW
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Tạo hàng nghìn hạt tuyết 3D
            const particlesGeometry = new THREE.BufferGeometry();
            const count = 15000;
            const positions = new Float32Array(count * 3);

            for(let i = 0; i < count * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 100;
            }
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.1,
                color: '#ffffff',
                transparent: true,
                opacity: 0.8
            });

            const particles = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particles);

            camera.position.z = 5;

            // Xoay 360 độ bằng chuột/tay
            let mouseX = 0, mouseY = 0;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - window.innerWidth / 2) * 0.05;
                mouseY = (e.clientY - window.innerHeight / 2) * 0.05;
            });

            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.002; // Tuyết tự quay
                camera.position.x += (mouseX - camera.position.x) * 0.05;
                camera.position.y += (-mouseY - camera.position.y) * 0.05;
                camera.lookAt(scene.position);
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
