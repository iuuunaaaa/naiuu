<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Na - Dear My Love</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            color: #fff;
            font-family: 'Playfair Display', serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Giao diện thư lụa cực kỳ chuyên nghiệp */
        #letter-envelope {
            background: #fff;
            padding: 60px 40px;
            width: 85%;
            max-width: 450px;
            border-radius: 5px;
            box-shadow: 0 10px 50px rgba(212, 175, 55, 0.2);
            text-align: center;
            transition: all 1s ease-in-out;
            color: #111;
            border: 1px solid #d4af37;
        }

        h1 { font-size: 2.2rem; margin-bottom: 20px; letter-spacing: 5px; color: #b8860b; }
        
        .content {
            font-size: 1.1rem; line-height: 2; margin-bottom: 40px;
            font-style: italic; color: #333;
        }

        #open-btn {
            background: #000; color: #fff; border: 1px solid #d4af37;
            padding: 15px 45px; font-size: 0.9rem; letter-spacing: 3px;
            cursor: pointer; transition: 0.5s;
        }

        #open-btn:hover { background: #d4af37; color: #000; box-shadow: 0 0 20px #d4af37; }

        /* Màn hình hiển thị khi đang phát nhạc */
        #music-active {
            display: none; text-align: center; color: #d4af37;
            animation: fadeIn 2s forwards;
        }

        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

    <div id="letter-envelope">
        <h1>For Na</h1>
        <div class="content">
            "Có những bản tình ca chỉ dành cho những người đặc biệt. <br>
            Cảm ơn Na đã luôn là một phần dịu dàng trong cuộc sống này. <br>
            Hãy để giai điệu này thay lời muốn nói..."
        </div>
        <button id="open-btn">MỞ QUÀ TẶNG NA</button>
    </div>

    <div id="music-active">
        <h2 style="font-size: 1.5rem; letter-spacing: 5px;">MUSIC FOR YOU...</h2>
        <p style="color: #888; font-style: italic;">Giai điệu đang vang lên vì Na</p>
    </div>

    <div id="youtube-audio" style="position: absolute; top: -9999px;"></div>

    <script>
        // Bê nguyên bộ link nhạc từ code của ANH VINH
        const musicList = ['8fGulQZ0QHY', 'WAw_8GjjF5M', 'qQDjCiyFIiY'];
        let player;

        // Tải YouTube IFrame API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-audio', {
                height: '0', width: '0',
                videoId: musicList[0], // Lấy bài đầu tiên
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': musicList.join(',') // Tạo danh sách phát
                }
            });
        }

        document.getElementById('open-btn').addEventListener('click', function() {
            // Hiệu ứng ẩn thư
            const envelope = document.getElementById('letter-envelope');
            envelope.style.opacity = '0';
            envelope.style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                envelope.style.display = 'none';
                document.getElementById('music-active').style.display = 'block';
                
                // ĐỊT MẸ, KÍCH HOẠT NHẠC NGAY LẬP TỨC
                if (player) {
                    player.playVideo();
                    player.unMute();
                }
            }, 1000);
        });
    </script>
</body>
</html>
