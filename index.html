<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vin Sì Ke Love Na Bell</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        body {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Thư chuyên nghiệp Luxury */
        #letter-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 50px 40px;
            border: 1px solid #d4af37;
            text-align: center;
            max-width: 500px;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 1);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: #d4af37;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .message {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 30px;
            color: #efefef;
            font-weight: 300;
        }

        /* Chữ By Vin Sì Ke 7 sắc cầu vồng đổi màu nhanh */
        .signature {
            display: block;
            margin-top: 25px;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 400% 400%;
            animation: fastRainbow 0.5s linear infinite;
        }

        @keyframes fastRainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        #btn-hide {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 12px 40px;
            font-size: 0.8rem;
            letter-spacing: 4px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
            transition: 0.4s;
        }

        #btn-hide:hover { background: #fff; color: #000; }

        /* Sequence 3 2 1 màu trắng */
        #sequence-screen {
            display: none;
            position: fixed;
            text-align: center;
            z-index: 100;
        }

        #counter {
            font-size: 8rem;
            font-weight: 800;
            color: #ffffff; /* Trắng chuẩn */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        #main-text {
            font-size: 6rem;
            font-weight: 800;
            letter-spacing: 15px;
            color: #fff;
            text-transform: uppercase;
        }

        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

    <div id="letter-box">
        <h2>Na Ơi Iu Na Bell!</h2>
        <div class="message">
            Na Ơi Iu Na Bell! <br>
            Chúc Na Mau Lớn Mau Cao Mau Mặp Mặp <br>
            Học Giỏi Tí Cho Đẳng Cấp <br>
            Nghiện Game Hơn Cho Bá Sàn, <br>
            Luôn Luôn Tươi Cười Nhé <br>
            Vin Sike Love Na Bell!
            <span class="signature">By Vin Sì Ke</span>
        </div>
        <button id="btn-hide">Ẩn Thư</button>
    </div>

    <div id="sequence-screen">
        <div id="counter"></div>
        <div id="main-text"></div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const btn = document.getElementById('btn-hide');
        const letter = document.getElementById('letter-box');
        const screen = document.getElementById('sequence-screen');
        const counter = document.getElementById('counter');
        const mainText = document.getElementById('main-text');
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        btn.addEventListener('click', () => {
            letter.style.opacity = '0';
            letter.style.transform = 'translateY(-50px) scale(0.9)';
            setTimeout(() => {
                letter.style.display = 'none';
                screen.style.display = 'block';
                startCountdown();
            }, 1000);
        });

        function startCountdown() {
            let count = 3;
            const timer = setInterval(() => {
                if (count > 0) {
                    counter.innerText = count;
                } else {
                    clearInterval(timer);
                    counter.innerText = "";
                    showNaBell();
                }
                count--;
            }, 1000);
        }

        function showNaBell() {
            const str = "NA Bell";
            let i = 0;
            const type = setInterval(() => {
                mainText.innerText += str[i];
                i++;
                if (i === str.length) {
                    clearInterval(type);
                    setTimeout(explode, 1500);
                }
            }, 500);
        }

        function explode() {
            html2canvas(mainText, { backgroundColor: null }).then(cvs => {
                const imgData = cvs.getContext('2d').getImageData(0, 0, cvs.width, cvs.height);
                mainText.style.opacity = '0';
                const particles = [];
                const rect = mainText.getBoundingClientRect();

                for (let y = 0; y < cvs.height; y += 3) {
                    for (let x = 0; x < cvs.width; x += 3) {
                        const i = (y * cvs.width + x) * 4;
                        if (imgData.data[i + 3] > 128) {
                            particles.push({
                                x: rect.left + x,
                                y: rect.top + y,
                                vx: (Math.random() - 0.5) * 30, // Nổ bay khắp màn hình
                                vy: (Math.random() - 0.5) * 30,
                                size: Math.random() * 4 + 1,
                                alpha: 1
                            });
                        }
                    }
                }

                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach((p, index) => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.alpha -= 0.004;
                        ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        if (p.alpha <= 0) particles.splice(index, 1);
                    });
                    if (particles.length > 0) requestAnimationFrame(animate);
                }
                animate();
            });
        }
    </script>
</body>
</html>
