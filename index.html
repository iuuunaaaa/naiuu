<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Na - Đoạn Kết Của Sự Chân Thành</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* Hiệu ứng nền mờ ảo */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        /* Thư phong cách Minimalism cực sang */
        #letter-box {
            background: #fff;
            padding: 60px;
            width: 80%;
            max-width: 500px;
            border-radius: 2px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #letter-box h1 {
            font-family: 'Playfair Display', serif;
            color: #111;
            font-size: 2.2rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .message {
            color: #444;
            line-height: 2;
            font-size: 1.1rem;
            font-style: italic;
            margin-bottom: 40px;
        }

        /* Nút bấm tinh tế */
        #btn-open {
            background: #000;
            color: #fff;
            border: none;
            padding: 18px 45px;
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
        }

        #btn-open:hover {
            background: #d4af37;
            color: #000;
        }

        /* Màn hình phát nhạc */
        #music-screen {
            display: none;
            text-align: center;
            color: #d4af37;
            animation: zoomIn 1.5s forwards;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Ẩn trình phát nhạc */
        #video-player {
            position: absolute;
            width: 1px; height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="letter-box">
        <h1>For Na</h1>
        <div class="message">
            "Có những khoảnh khắc, ngôn từ trở nên nhỏ bé trước những tâm tư muốn gửi trao. Cảm ơn Na đã xuất hiện, để thế giới này thêm phần dịu dàng. Hãy để giai điệu này thay lời muốn nói, gửi đến Na những bình yên nhất..."
        </div>
        <button id="btn-open">Lắng nghe</button>
    </div>

    <div id="music-screen">
        <h2 style="font-size: 1.5rem; letter-spacing: 5px;">THƯỞNG THỨC NHẠC...</h2>
        <p style="color: #888;">Giai điệu này là dành riêng cho Na</p>
    </div>

    <div id="player-container"></div>

    <script>
        document.getElementById('btn-open').addEventListener('click', function() {
            // Hiệu ứng ẩn thư chuyên nghiệp
            const box = document.getElementById('letter-box');
            box.style.opacity = '0';
            box.style.transform = 'translateY(-50px)';
            
            setTimeout(() => {
                box.style.display = 'none';
                document.getElementById('music-screen').style.display = 'block';

                // Địt mẹ, nhúng thẳng iframe vào để nó tự phát ngay lập tức
                const container = document.getElementById('player-container');
                container.innerHTML = `
                    <iframe id="video-player" 
                        src="https://www.youtube.com/embed/8fGulQZ0QHY?autoplay=1&mute=0" 
                        allow="autoplay">
                    </iframe>
                `;
            }, 1000);
        });
    </script>

</body>
</html>
