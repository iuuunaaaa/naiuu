<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vin Sì Ke Love Na Bell</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Playfair+Display:wght@700&display=swap');

        body {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Thư 7 sắc cầu vồng đổi màu nhanh */
        #letter-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 5px solid;
            text-align: center;
            max-width: 500px;
            border-radius: 15px;
            animation: rainbowBorder 0.5s linear infinite; /* Đổi màu siêu nhanh */
            transition: all 1s ease-in-out;
        }

        @keyframes rainbowBorder {
            0% { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
            14% { border-color: #ff7f00; box-shadow: 0 0 20px #ff7f00; }
            28% { border-color: #ffff00; box-shadow: 0 0 20px #ffff00; }
            42% { border-color: #00ff00; box-shadow: 0 0 20px #00ff00; }
            56% { border-color: #0000ff; box-shadow: 0 0 20px #0000ff; }
            70% { border-color: #4b0082; box-shadow: 0 0 20px #4b0082; }
            84% { border-color: #9400d3; box-shadow: 0 0 20px #9400d3; }
            100% { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ef5350, #f48fb1, #7e57c2, #2196f3, #26c6da, #43a047, #eeff41, #f9a825, #ff5722);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 400% 400%;
            animation: rainbowText 1s linear infinite;
        }

        @keyframes rainbowText {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .message {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #fff;
            font-weight: bold;
        }

        .signature {
            display: block;
            margin-top: 20px;
            font-size: 1.3rem;
            color: #d4af37;
            text-transform: uppercase;
        }

        #btn-open {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
        }

        #btn-open:hover { transform: scale(1.1); background: #ff00ea; color: #fff; }

        /* Sequence Screen */
        #sequence-screen {
            display: none;
            position: fixed;
            text-align: center;
        }

        #counter { font-size: 7rem; color: #fff; }
        #main-text { font-size: 6rem; letter-spacing: 15px; color: #fff; }

        canvas { position: fixed; top: 0; left: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="letter-box">
        <h2>Na Ơi Iu Na Bell!</h2>
        <div class="message">
            Chúc Na Mau Lớn Mau Cao Mau Mặp Mặp <br>
            Học Giỏi Tí Cho Đẳng Cấp <br>
            Nghiện Game Hơn Cho Bá Sàn, <br>
            Luôn Luôn Tươi Cười Nhé <br>
            Vin Sike Love Na Bell!
            <span class="signature">By Vin Sì Ke</span>
        </div>
        <button id="btn-open">Ẩn Thư</button>
    </div>

    <div id="sequence-screen">
        <div id="counter"></div>
        <div id="main-text"></div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const btn = document.getElementById('btn-open');
        const letter = document.getElementById('letter-box');
        const screen = document.getElementById('sequence-screen');
        const counter = document.getElementById('counter');
        const mainText = document.getElementById('main-text');
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        btn.addEventListener('click', () => {
            letter.style.opacity = '0';
            letter.style.transform = 'scale(0) rotate(720deg)'; // Hiệu ứng biến mất cực đẹp
            setTimeout(() => {
                letter.style.display = 'none';
                screen.style.display = 'block';
                startCountdown();
            }, 1000);
        });

        function startCountdown() {
            let count = 3;
            const timer = setInterval(() => {
                counter.innerText = count;
                if (count === 0) {
                    clearInterval(timer);
                    counter.innerText = "";
                    drawNaBell();
                }
                count--;
            }, 1000);
        }

        function drawNaBell() {
            const str = "NA Bell";
            let i = 0;
            const type = setInterval(() => {
                mainText.innerText += str[i];
                i++;
                if (i === str.length) {
                    clearInterval(type);
                    setTimeout(explodeToSnow, 1500);
                }
            }, 500);
        }

        function explodeToSnow() {
            html2canvas(mainText, { backgroundColor: null }).then(cvs => {
                const imgData = cvs.getContext('2d').getImageData(0, 0, cvs.width, cvs.height);
                mainText.style.opacity = '0';
                const particles = [];
                const rect = mainText.getBoundingClientRect();

                for (let y = 0; y < cvs.height; y += 3) {
                    for (let x = 0; x < cvs.width; x += 3) {
                        const i = (y * cvs.width + x) * 4;
                        if (imgData.data[i + 3] > 128) {
                            particles.push({
                                x: rect.left + x,
                                y: rect.top + y,
                                vx: (Math.random() - 0.5) * 25, // Nổ tung khắp màn hình
                                vy: (Math.random() - 0.5) * 25,
                                size: Math.random() * 4 + 1,
                                alpha: 1
                            });
                        }
                    }
                }

                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach((p, index) => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.alpha -= 0.005;
                        ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        if (p.alpha <= 0) particles.splice(index, 1);
                    });
                    if (particles.length > 0) requestAnimationFrame(animate);
                }
                animate();
            });
        }
    </script>
</body>
</html>
