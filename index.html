<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Na Thân Thương</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d; /* Nền tối siêu đẹp */
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #letter-container {
            width: 85%;
            max-width: 500px;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.2);
            text-align: center;
            border: 1px solid #333;
            z-index: 10;
        }

        h1 { color: #f1c40f; margin-bottom: 15px; }
        p { line-height: 1.8; color: #ccc; }

        #hide-btn {
            margin-top: 25px;
            padding: 10px 40px;
            background: #f1c40f;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #hide-btn:hover { transform: scale(1.1); background: #fff; }

        /* Ẩn iframe nhạc đi cho chuyên nghiệp */
        #music-box {
            display: none;
        }

        #main-content {
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="letter-container">
        <h1>Gửi Na...</h1>
        <p>
            Chúc Na một ngày thật tuyệt vời và tràn đầy niềm vui. <br>
            Hy vọng món quà nhỏ này sẽ làm Na mỉm cười!
        </p>
        <button id="hide-btn">Mở quà nè</button>
    </div>

    <div id="main-content">
        <h2 style="color: #f1c40f;">Đang phát nhạc dành cho Na...</h2>
        <p>Lắng nghe giai điệu này nhé!</p>
    </div>

    <div id="music-box">
        <iframe id="youtube-audio" 
            src="https://www.youtube.com/embed/8fGulQZ0QHY?enablejsapi=1" 
            allow="autoplay">
        </iframe>
    </div>

    <script>
        const btn = document.getElementById('hide-btn');
        const letter = document.getElementById('letter-container');
        const content = document.getElementById('main-content');
        const iframe = document.getElementById('youtube-audio');

        btn.addEventListener('click', () => {
            // Ẩn lá thư và hiện nội dung mới
            letter.style.display = 'none';
            content.style.display = 'block';

            // Địt mẹ, kích hoạt nhạc ngay lập tức
            let musicSrc = iframe.src;
            iframe.src = musicSrc + "&autoplay=1&loop=1&playlist=8fGulQZ0QHY";
        });
    </script>

</body>
</html>
