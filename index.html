<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vin Sì Ke Love Na Bell</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        body {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Thư Vuýp Luxury */
        #letter-box {
            background: rgba(20, 20, 20, 0.95);
            padding: 40px;
            border: 2px solid #d4af37;
            text-align: center;
            max-width: 450px;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
            transition: all 1s ease-in-out;
            backdrop-filter: blur(15px);
        }

        #letter-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #d4af37;
            margin-bottom: 20px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .message {
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 20px;
            color: #ddd;
            font-weight: 300;
        }

        /* By Vin Sì Ke 7 sắc cầu vồng */
        .signature {
            display: block;
            margin-top: 20px;
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 400% 400%;
            animation: fastRainbow 0.5s linear infinite;
        }

        @keyframes fastRainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        #btn-hide {
            background: transparent;
            color: #fff;
            border: 1px solid #d4af37;
            padding: 10px 35px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
            transition: 0.3s;
        }

        #btn-hide:hover { background: #d4af37; color: #000; }

        /* Sequence Screen */
        #sequence-screen {
            display: none;
            position: fixed;
            text-align: center;
            z-index: 100;
        }

        #counter {
            font-size: 7rem;
            font-weight: 800;
            color: #fff;
        }

        #main-text {
            font-size: 3.5rem; /* Đã thu nhỏ cho chuyên nghiệp */
            font-weight: 700;
            letter-spacing: 10px;
            color: #fff;
            text-transform: uppercase;
        }

        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

    <div id="letter-box">
        <h1>THƯ VUÝP</h1>
        <div class="message">
            Na Ơi Iu Na Bell! <br>
            Chúc Na Mau Lớn Mau Cao Mau Mặp Mặp <br>
            Học Giỏi Tí Cho Đẳng Cấp <br>
            Nghiện Game Hơn Cho Bá Sàn, <br>
            Luôn Luôn Tươi Cười Nhé <br>
            Vin Sike Love Na Bell!
            <span class="signature">By Vin Sì Ke</span>
        </div>
        <button id="btn-hide">ẨN THƯ</button>
    </div>

    <div id="sequence-screen">
        <div id="counter"></div>
        <div id="main-text"></div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const btn = document.getElementById('btn-hide');
        const letter = document.getElementById('letter-box');
        const screen = document.getElementById('sequence-screen');
        const counter = document.getElementById('counter');
        const mainText = document.getElementById('main-text');
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        btn.addEventListener('click', () => {
            letter.style.opacity = '0';
            letter.style.transform = 'scale(0.8) translateY(20px)';
            setTimeout(() => {
                letter.style.display = 'none';
                screen.style.display = 'block';
                startCountdown();
            }, 1000);
        });

        function startCountdown() {
            let count = 3;
            const timer = setInterval(() => {
                if (count > 0) {
                    counter.innerText = count;
                } else {
                    clearInterval(timer);
                    counter.innerText = "";
                    showNaBell();
                }
                count--;
            }, 1000);
        }

        function showNaBell() {
            const str = "NA Bell";
            let i = 0;
            const type = setInterval(() => {
                mainText.innerText += str[i];
                i++;
                if (i === str.length) {
                    clearInterval(type);
                    setTimeout(explode, 1200);
                }
            }, 400); // Đổi từng chữ chậm rãi
        }

        function explode() {
            html2canvas(mainText, { backgroundColor: null }).then(cvs => {
                const imgData = cvs.getContext('2d').getImageData(0, 0, cvs.width, cvs.height);
                mainText.style.opacity = '0';
                const particles = [];
                const rect = mainText.getBoundingClientRect();

                for (let y = 0; y < cvs.height; y += 3) {
                    for (let x = 0; x < cvs.width; x += 3) {
                        const i = (y * cvs.width + x) * 4;
                        if (imgData.data[i + 3] > 128) {
                            particles.push({
                                x: rect.left + x,
                                y: rect.top + y,
                                vx: (Math.random() - 0.5) * 25,
                                vy: (Math.random() - 0.5) * 25,
                                size: Math.random() * 3 + 1,
                                alpha: 1
                            });
                        }
                    }
                }

                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach((p, index) => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.alpha -= 0.005;
                        ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        if (p.alpha <= 0) particles.splice(index, 1);
                    });
                    if (particles.length > 0) requestAnimationFrame(animate);
                }
                animate();
            });
        }
    </script>
</body>
</html>
