<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THƯ VUÝP - VIN SÌ KE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&family=Playfair+Display:wght@700&display=swap');
        
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        
        /* Khung thư cố định cực chuẩn */
        #letter-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; padding: 20px;
        }

        #letter-box {
            background: rgba(10, 10, 10, 0.98);
            padding: 40px 30px;
            border: 2px solid #d4af37;
            text-align: center;
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
            transition: all 0.8s ease;
        }

        h1 { font-family: 'Playfair Display', serif; color: #d4af37; font-size: 2.5rem; margin: 0 0 20px 0; letter-spacing: 5px; }
        .msg { color: #eee; line-height: 1.8; font-size: 1.1rem; margin-bottom: 25px; }

        .signature {
            display: block; font-size: 1.6rem; font-weight: 900; margin-top: 15px;
            background: linear-gradient(to right, red, orange, yellow, green, blue, purple, red);
            background-size: 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: rainbow 0.6s linear infinite;
        }
        @keyframes rainbow { 0% { background-position: 0%; } 100% { background-position: 100%; } }

        #btn-hide {
            background: #fff; color: #000; border: none; padding: 15px 45px;
            font-weight: 900; cursor: pointer; letter-spacing: 2px; border-radius: 5px;
            text-transform: uppercase;
        }

        /* Khu vực hiện 3 2 1 và NA Bell */
        #overlay-ui {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 500; pointer-events: none; color: #fff;
        }
        #counter { font-size: 9rem; font-weight: 900; color: #fff; }
        #na-bell { font-size: 4.5rem; font-weight: 900; letter-spacing: 12px; white-space: nowrap; opacity: 1; transition: opacity 1.5s; }

        canvas#world { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 10; cursor: move; }
    </style>
</head>
<body>

    <div id="letter-wrapper">
        <div id="letter-box">
            <h1>THƯ VUÝP</h1>
            <div class="msg">
                Na Ơi Iu Na Bell! <br>
                Chúc Na Mau Lớn Mau Cao Mau Mặp Mặp <br>
                Học Giỏi Tí Cho Đẳng Cấp <br>
                Nghiện Game Hơn Cho Bá Sàn, <br>
                Luôn Luôn Tươi Cười Nhé <br>
                Vin Sike Love Na Bell!
                <span class="signature">By Vin Sì Ke</span>
            </div>
            <button id="btn-hide">ẨN THƯ</button>
        </div>
    </div>

    <div id="overlay-ui">
        <div id="counter"></div>
        <div id="na-bell"></div>
    </div>

    <canvas id="world"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const btn = document.getElementById('btn-hide');
        const wrapper = document.getElementById('letter-wrapper');
        const counterEl = document.getElementById('counter');
        const naEl = document.getElementById('na-bell');
        const canvas = document.getElementById('world');

        btn.addEventListener('click', () => {
            wrapper.style.opacity = '0';
            wrapper.style.pointerEvents = 'none';
            setTimeout(() => {
                wrapper.style.display = 'none';
                startSequence();
            }, 800);
        });

        function startSequence() {
            let count = 3;
            let timer = setInterval(() => {
                if (count > 0) {
                    counterEl.innerText = count;
                } else {
                    clearInterval(timer);
                    counterEl.innerText = "";
                    showNaBellTyping();
                }
                count--;
            }, 1000);
        }

        function showNaBellTyping() {
            const text = "NA Bell";
            let i = 0;
            let typeTimer = setInterval(() => {
                naEl.innerText += text[i];
                i++;
                if (i === text.length) {
                    clearInterval(typeTimer);
                    // Sau khi hiện xong 1.5s thì cho tan biến hẳn
                    setTimeout(() => {
                        naEl.style.opacity = '0';
                        setTimeout(() => {
                            naEl.innerText = ""; // Xóa hẳn chữ
                            init3DSnow(); // Bật tuyết
                        }, 1500);
                    }, 1500);
                }
            }, 500);
        }

        function init3DSnow() {
            canvas.style.display = 'block';
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const particlesCount = 15000;
            const positions = new Float32Array(particlesCount * 3);
            const vels = new Float32Array(particlesCount);

            for (let i = 0; i < particlesCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 100;
                vels[i] = Math.random() * 0.08 + 0.03; 
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.18, transparent: true, opacity: 0.9 });
            const snow = new THREE.Points(geometry, material);
            scene.add(snow);

            camera.position.z = 5;

            let isDragging = false;
            let prevX = 0, prevY = 0;

            const updateRot = (x, y) => {
                if (isDragging) {
                    snow.rotation.y += (x - prevX) * 0.005;
                    snow.rotation.x += (y - prevY) * 0.005;
                }
                prevX = x; prevY = y;
            };

            window.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => updateRot(e.clientX, e.clientY));
            window.addEventListener('touchstart', (e) => { isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; });
            window.addEventListener('touchend', () => isDragging = false);
            window.addEventListener('touchmove', (e) => updateRot(e.touches[0].clientX, e.touches[0].clientY));

            function animate() {
                requestAnimationFrame(animate);
                const pos = geometry.attributes.position.array;
                for (let i = 0; i < particlesCount; i++) {
                    pos[i * 3 + 1] -= vels[i];
                    if (pos[i * 3 + 1] < -50) pos[i * 3 + 1] = 50;
                }
                geometry.attributes.position.needsUpdate = true;
                renderer.render(scene, camera);
            }
            animate();

            // Fix lỗi load lại khi resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
