<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THƯ VUÝP - VIN SÌ KE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&family=Playfair+Display:wght@700&display=swap');
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        
        /* Giao diện Thư Vuýp chuẩn */
        #ui-wrapper { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 100; }
        
        #letter-box {
            background: rgba(10, 10, 10, 0.9);
            padding: 40px;
            border: 2px solid #d4af37;
            text-align: center;
            max-width: 420px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            transition: 1s ease;
        }

        h1 { font-family: 'Playfair Display', serif; color: #d4af37; font-size: 2.5rem; margin-bottom: 20px; letter-spacing: 5px; }
        
        .msg { color: #eee; line-height: 1.8; font-size: 1rem; margin-bottom: 25px; }

        .signature {
            display: block; font-size: 1.5rem; font-weight: 900; margin-top: 15px;
            background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet, red);
            background-size: 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: rainbow 0.8s linear infinite;
        }
        @keyframes rainbow { 0% { background-position: 0%; } 100% { background-position: 100%; } }

        #btn-hide {
            background: #fff; color: #000; border: none; padding: 12px 40px;
            font-weight: 900; cursor: pointer; letter-spacing: 2px; border-radius: 5px;
        }

        /* Countdown & Na Bell */
        #overlay-text { position: absolute; color: #fff; text-align: center; pointer-events: none; z-index: 50; width: 100%; }
        #counter { font-size: 8rem; font-weight: 900; }
        #na-bell { font-size: 4rem; font-weight: 900; letter-spacing: 10px; display: none; }

        canvas#world { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; }
    </style>
</head>
<body>

    <div id="ui-wrapper">
        <div id="letter-box">
            <h1>THƯ VUÝP</h1>
            <div class="msg">
                Na Ơi Iu Na Bell! <br>
                Chúc Na Mau Lớn Mau Cao Mau Mặp Mặp <br>
                Học Giỏi Tí Cho Đẳng Cấp <br>
                Nghiện Game Hơn Cho Bá Sàn, <br>
                Luôn Luôn Tươi Cười Nhé <br>
                Vin Sike Love Na Bell!
                <span class="signature">By Vin Sì Ke</span>
            </div>
            <button id="btn-hide">ẨN THƯ</button>
        </div>
    </div>

    <div id="overlay-text">
        <div id="counter"></div>
        <div id="na-bell">NA Bell</div>
    </div>

    <canvas id="world"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const btn = document.getElementById('btn-hide');
        const box = document.getElementById('letter-box');
        const counterEl = document.getElementById('counter');
        const naEl = document.getElementById('na-bell');
        const canvas = document.getElementById('world');

        btn.addEventListener('click', () => {
            box.style.opacity = '0';
            box.style.transform = 'scale(0.5)';
            setTimeout(() => {
                document.getElementById('ui-wrapper').style.display = 'none';
                startSequence();
            }, 1000);
        });

        function startSequence() {
            let count = 3;
            let timer = setInterval(() => {
                if (count > 0) {
                    counterEl.innerText = count;
                } else {
                    clearInterval(timer);
                    counterEl.innerText = "";
                    showNaBell();
                }
                count--;
            }, 1000);
        }

        function showNaBell() {
            naEl.style.display = 'block';
            setTimeout(() => {
                naEl.style.transition = '2s';
                naEl.style.opacity = '0';
                naEl.style.filter = 'blur(20px)';
                init3DScene(); // Bắt đầu thế giới tuyết 3D
            }, 2000);
        }

        function init3DScene() {
            canvas.style.display = 'block';
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Tạo 20,000 hạt tuyết khắp không gian
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 20000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(200)); // X
                vertices.push(THREE.MathUtils.randFloatSpread(200)); // Y
                vertices.push(THREE.MathUtils.randFloatSpread(200)); // Z
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            
            const material = new THREE.PointsMaterial({ color: 0xFFFFFF, size: 0.2, transparent: true });
            const points = new THREE.Points(geometry, material);
            scene.add(points);

            camera.position.z = 1;

            // Xoay 360 độ bằng tay/chuột
            let isDragging = false;
            let targetRotationX = 0;
            let targetRotationY = 0;

            const updateRotation = (deltaX, deltaY) => {
                points.rotation.y += deltaX * 0.005;
                points.rotation.x += deltaY * 0.005;
            };

            // Sự kiện chuột
            window.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => {
                if (isDragging) updateRotation(e.movementX, e.movementY);
            });

            // Sự kiện cảm ứng (cho điện thoại)
            let lastTouchX, lastTouchY;
            window.addEventListener('touchstart', (e) => {
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            });
            window.addEventListener('touchmove', (e) => {
                const deltaX = e.touches[0].clientX - lastTouchX;
                const deltaY = e.touches[0].clientY - lastTouchY;
                updateRotation(deltaX, deltaY);
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            });

            function animate() {
                requestAnimationFrame(animate);
                points.rotation.y += 0.001; // Tuyết tự xoay nhẹ
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
