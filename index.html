<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THƯ VUÝP - VIN SÌ KE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&family=Playfair+Display:wght@700&display=swap');
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        
        #letter-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15, 15, 15, 0.95); padding: 40px; border: 2px solid #d4af37;
            text-align: center; max-width: 450px; border-radius: 5px; z-index: 100;
        }

        h1 { font-family: 'Playfair Display', serif; color: #d4af37; font-size: 2.2rem; margin-bottom: 20px; letter-spacing: 5px; }
        .msg { color: #ccc; line-height: 1.8; margin-bottom: 25px; }

        .signature {
            display: block; font-size: 1.4rem; font-weight: 900; margin-top: 15px;
            background: linear-gradient(to right, red, orange, yellow, green, blue, purple, red);
            background-size: 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: rainbow 0.6s linear infinite;
        }
        @keyframes rainbow { 0% { background-position: 0%; } 100% { background-position: 100%; } }

        #btn-hide { background: #fff; color: #000; border: none; padding: 12px 40px; font-weight: 900; cursor: pointer; }

        #display-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 50; pointer-events: none; color: #fff; }
        #counter { font-size: 8rem; font-weight: 900; }
        #na-bell { font-size: 4rem; font-weight: 900; letter-spacing: 15px; white-space: nowrap; }

        canvas#world { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; cursor: grab; }
    </style>
</head>
<body>

    <div id="letter-box">
        <h1>THƯ VUÝP</h1>
        <div class="msg">
            Na Ơi Iu Na Bell! <br>
            Chúc Na Mau Lớn Mau Cao Mau Mặp Mặp <br>
            Học Giỏi Tí Cho Đẳng Cấp <br>
            Nghiện Game Hơn Cho Bá Sàn, <br>
            Luôn Luôn Tươi Cười Nhé <br>
            Vin Sike Love Na Bell!
            <span class="signature">By Vin Sì Ke</span>
        </div>
        <button id="btn-hide">ẨN THƯ</button>
    </div>

    <div id="display-center">
        <div id="counter"></div>
        <div id="na-bell"></div>
    </div>

    <canvas id="world"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const btn = document.getElementById('btn-hide');
        const box = document.getElementById('letter-box');
        const counterEl = document.getElementById('counter');
        const naEl = document.getElementById('na-bell');
        const canvas = document.getElementById('world');

        btn.addEventListener('click', () => {
            box.style.display = 'none';
            startSequence();
        });

        function startSequence() {
            let count = 3;
            let timer = setInterval(() => {
                if (count > 0) counterEl.innerText = count;
                else {
                    clearInterval(timer);
                    counterEl.innerText = "";
                    showNaBellTyping();
                }
                count--;
            }, 1000);
        }

        function showNaBellTyping() {
            const text = "NA Bell";
            let i = 0;
            let typeTimer = setInterval(() => {
                naEl.innerText += text[i];
                i++;
                if (i === text.length) {
                    clearInterval(typeTimer);
                    setTimeout(() => {
                        naEl.style.display = 'none';
                        init3DSnow();
                    }, 1500);
                }
            }, 500);
        }

        function init3DSnow() {
            canvas.style.display = 'block';
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const particlesCount = 15000;
            const positions = new Float32Array(particlesCount * 3);
            const velocities = new Float32Array(particlesCount); // Tốc độ rơi riêng từng hạt

            for (let i = 0; i < particlesCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 100;     // X
                positions[i * 3 + 1] = Math.random() * 100;        // Y (bắt đầu từ trên)
                positions[i * 3 + 2] = (Math.random() - 0.5) * 100; // Z
                velocities[i] = Math.random() * 0.05 + 0.02;       // Tốc độ rơi nhỏ, mịn
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.8 });
            const snow = new THREE.Points(geometry, material);
            scene.add(snow);

            camera.position.z = 5;

            // Xoay bằng tay/chuột
            let isDragging = false;
            let previousMouseX = 0;
            let previousMouseY = 0;

            window.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMouseX;
                    const deltaY = e.clientY - previousMouseY;
                    snow.rotation.y += deltaX * 0.005;
                    snow.rotation.x += deltaY * 0.005;
                }
                previousMouseX = e.clientX;
                previousMouseY = e.clientY;
            });

            // Touch cho điện thoại
            window.addEventListener('touchstart', (e) => {
                isDragging = true;
                previousMouseX = e.touches[0].clientX;
                previousMouseY = e.touches[0].clientY;
            });
            window.addEventListener('touchend', () => isDragging = false);
            window.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    const deltaX = e.touches[0].clientX - previousMouseX;
                    const deltaY = e.touches[0].clientY - previousMouseY;
                    snow.rotation.y += deltaX * 0.005;
                    snow.rotation.x += deltaY * 0.005;
                    previousMouseX = e.touches[0].clientX;
                    previousMouseY = e.touches[0].clientY;
                }
            });

            function animate() {
                requestAnimationFrame(animate);

                const positions = geometry.attributes.position.array;
                for (let i = 0; i < particlesCount; i++) {
                    positions[i * 3 + 1] -= velocities[i]; // Rơi xuống
                    if (positions[i * 3 + 1] < -50) positions[i * 3 + 1] = 50; // Quay lại đỉnh
                }
                geometry.attributes.position.needsUpdate = true;

                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
