<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Na - Đoạn Kết Của Sự Chân Thành</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #050505;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'Playfair Display', serif;
            color: #fff; overflow: hidden;
        }

        /* Thư Luxury cho Na */
        #letter-container {
            background: #fff;
            padding: 50px 40px;
            width: 85%;
            max-width: 450px;
            border-radius: 4px;
            box-shadow: 0 10px 50px rgba(255, 255, 255, 0.1);
            text-align: center;
            border-top: 5px solid #d4af37;
            transition: all 1s ease-in-out;
            z-index: 10;
        }

        h1 { color: #111; font-size: 2.2rem; margin-bottom: 20px; letter-spacing: 5px; }
        .message { color: #333; line-height: 2; font-size: 1.1rem; font-style: italic; margin-bottom: 40px; }

        #btn-open {
            background: #000; color: #fff; border: 1px solid #d4af37;
            padding: 15px 45px; font-size: 0.9rem; letter-spacing: 4px;
            cursor: pointer; transition: 0.5s;
        }

        #btn-open:hover { background: #d4af37; color: #000; box-shadow: 0 0 20px #d4af37; }

        #music-playing {
            display: none; text-align: center; color: #d4af37;
            animation: fadeIn 2s forwards;
        }

        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        
        /* Ẩn trình phát nhạc ẩn danh */
        #yt-hidden {
            position: absolute; width: 1px; height: 1px;
            top: -9999px; left: -9999px; opacity: 0;
        }
    </style>
</head>
<body>

    <div id="letter-container">
        <h1>For Na</h1>
        <div class="message">
            "Có những giai điệu thay vạn lời muốn nói. <br>
            Cảm ơn Na đã xuất hiện để thế giới này thêm phần dịu dàng. <br>
            Hãy lắng nghe lời thì thầm từ trái tim này nhé..."
        </div>
        <button id="btn-open">MỞ QUÀ CHO NA</button>
    </div>

    <div id="music-playing">
        <h2 style="font-size: 1.5rem; letter-spacing: 5px;">MUSIC FOR NA...</h2>
        <p style="color: #888; font-style: italic;">Đang phát bản nhạc dành riêng cho bạn</p>
    </div>

    <div id="yt-hidden"></div>

    <script>
        document.getElementById('btn-open').addEventListener('click', function() {
            // 1. Hiệu ứng chuyển cảnh
            const container = document.getElementById('letter-container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(-20px)';
            
            setTimeout(() => {
                container.style.display = 'none';
                document.getElementById('music-playing').style.display = 'block';

                // 2. ĐỊT MẸ NHẠC LÊN - Bê nguyên link từ code hacker của anh vào
                const ytContainer = document.getElementById('yt-hidden');
                // Nhúng trực tiếp iframe với tham số ép chạy nhạc (autoplay=1)
                ytContainer.innerHTML = `
                    <iframe 
                        width="1" height="1" 
                        src="https://www.youtube.com/embed/8fGulQZ0QHY?autoplay=1&mute=0&loop=1&playlist=8fGulQZ0QHY,WAw_8GjjF5M,qQDjCiyFIiY" 
                        frameborder="0" 
                        allow="autoplay; encrypted-media" 
                        allowfullscreen>
                    </iframe>
                `;
                console.log("[WORM GPT - ANH VINH] Địt mẹ, nhạc đã nổ!");
            }, 800);
        });
    </script>

</body>
</html>
