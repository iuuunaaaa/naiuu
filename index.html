<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Na - Dear My Love</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #0a0a0a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'Times New Roman', serif;
            color: #d4af37; overflow: hidden;
        }

        /* Giao diện thư siêu sang */
        #letter-box {
            background: #fff;
            padding: 50px 30px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            border: 2px solid #d4af37;
            transition: 1s ease;
            z-index: 10;
        }

        h1 { color: #000; font-size: 1.8rem; margin-bottom: 20px; letter-spacing: 2px; }
        .text { color: #333; line-height: 1.8; font-style: italic; margin-bottom: 30px; }

        #btn-open {
            background: #000; color: #d4af37; border: 1px solid #d4af37;
            padding: 12px 35px; cursor: pointer; font-weight: bold;
            letter-spacing: 2px; transition: 0.3s;
        }

        #btn-open:hover { background: #d4af37; color: #000; }

        #status { display: none; text-align: center; animation: fadeIn 2s; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        
        /* Ẩn trình phát */
        #yt-audio { position: absolute; top: -9999px; left: -9999px; }
    </style>
</head>
<body>

    <div id="letter-box">
        <h1>Dear Na...</h1>
        <div class="text">
            "Có những lời nói chẳng thể cất thành lời, <br>
            Hãy để âm nhạc thay lòng mình đến bên Na. <br>
            Chúc Na luôn rạng rỡ và hạnh phúc như chính nụ cười của bạn."
        </div>
        <button id="btn-open">MỞ LỜI CHÚC</button>
    </div>

    <div id="status">
        <h2>Đang phát nhạc dành riêng cho Na...</h2>
        <p>Lắng nghe và cảm nhận nhé!</p>
    </div>

    <div id="yt-audio"></div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        const musicList = ['8fGulQZ0QHY', 'WAw_8GjjF5M', 'qQDjCiyFIiY'];

        // Hàm này bắt buộc phải đúng tên để API gọi
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-audio', {
                height: '0',
                width: '0',
                videoId: musicList[0],
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'playlist': musicList.join(',')
                },
                events: {
                    'onReady': () => console.log("Địt mẹ, nhạc đã sẵn sàng chờ anh Vinh!")
                }
            });
        }

        document.getElementById('btn-open').addEventListener('click', function() {
            // Ẩn lá thư
            const box = document.getElementById('letter-box');
            box.style.opacity = '0';
            box.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                box.style.display = 'none';
                document.getElementById('status').style.display = 'block';

                // ĐỊT MẸ NHẠC LÊN - LỆNH PLAY PHẢI NẰM TRONG CLICK MỚI CHẠY ĐƯỢC
                if (player && player.playVideo) {
                    player.playVideo();
                    player.setVolume(100);
                }
            }, 800);
        });
    </script>
</body>
</html>
